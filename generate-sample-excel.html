<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成示例 Excel</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:520px;margin:40px auto;padding:20px;text-align:center}
.btn{display:block;width:100%;padding:16px;font-size:17px;border:none;border-radius:12px;cursor:pointer;margin-bottom:12px;font-family:inherit;font-weight:600}
.btn-gen{background:#217346;color:#fff}
.btn-gen:hover{background:#185a32}
.info{font-size:13px;color:#888;line-height:1.8;margin-top:16px;text-align:left;background:#f8f8f8;padding:14px;border-radius:10px}
.info strong{color:#555}
</style>
</head>
<body>
<h2>📊 生成模拟 Excel</h2>
<p style="color:#888;font-size:14px;margin-bottom:20px">点击下方按钮下载一份模拟的景区调研 Excel 文件</p>
<button class="btn btn-gen" onclick="generate()">📥 下载 sample-黄山风景区.xlsx</button>
<div class="info">
  <strong>Sheet 1「调研报告」</strong>— 竖向排版，可读的调研文档（含照片描述）<br>
  <strong>Sheet 2「数据汇总」</strong>— 横向一行，可直接复制到总表<br>
  <br>
  ⚠️ 照片仅出现在「调研报告」中，「数据汇总」只记录数量和文字描述，不嵌入图片以控制文件大小。
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
function generate(){

  // ============================================================
  // Sheet 1: 调研报告（竖向排版，给人读）
  // ============================================================
  var reportRows = [
    ['', ''],
    ['⛰️ 景区调研报告', ''],
    ['', ''],
    ['━━━ 基本信息 ━━━', ''],
    ['景区名称', '黄山风景区'],
    ['所在城市', '安徽省黄山市'],
    ['调研日期', '2026-05-27'],
    ['调研人员', '张三'],
    ['', ''],
    ['━━━ 现场实勘 ━━━', ''],
    ['景区类型', '5A'],
    ['', ''],
    ['预计日客流（千）', ''],
    ['  工作日', '12'],
    ['  周末', '30'],
    ['  节假日', '50'],
    ['', ''],
    ['景观分布', '分散（需交通工具）'],
    ['', ''],
    ['现有代步工具', '四轮自行车、四轮电瓶车、观光车'],
    ['', ''],
    ['代步工具收费方案', ''],
    ['  四轮自行车', '起步价 半小时 60元，超出后 每分钟 1元'],
    ['  四轮电瓶车', '起步价 一小时起 100元，超出后 每半小时 50元'],
    ['  观光车', '单程 20元/人（备注）'],
    ['', ''],
    ['车辆停放点', '充足 — 景区入口有大型停车场，各景点有小型停靠点'],
    ['路面情况', '大部分平整'],
    ['路面备注', '主干道为柏油路面，部分支路为石板路。后山有一段约200米的陡坡（坡度约15°），需注意。'],
    ['充电/停车设施', '有且方便 — 景区入口有充电桩8个'],
    ['', ''],
    ['━━━ 实勘照片 ━━━', '（共 3 张）'],
    ['照片1', '景区主入口的电瓶车停放点，可同时停放约20辆'],
    ['照片2', '后山路段—石板路面，部分区域有破损'],
    ['照片3', '景区入口充电桩区域，共8个桩位'],
    ['', ''],
    ['━━━ 线上推广 ━━━', ''],
    ['推广平台', '抖音、小红书、公众号'],
    ['推广活动', '有 — 定期发布景区短视频，有团购链接'],
    ['直播', '无'],
    ['消费券/门票', '有'],
    ['  消费券/门票说明', '抖音团购门票 198元/人，含景区大门票+索道'],
    ['门票最高销量', '约 8,000 张（2025年国庆期间）'],
    ['活动券/团购券信息', '目前有"早鸟票"活动，提前3天购票享8折；团购套餐含门票+住宿'],
    ['', ''],
    ['━━━ 负责人对接 ━━━', ''],
    ['对接状态', '已对接'],
    ['负责人姓名', '李建国'],
    ['负责人职务', '运营部经理'],
    ['负责人电话', '13905591234'],
    ['负责人微信', 'lijg_huangshan'],
    ['对接备注', '态度积极，对我们车型有兴趣。建议后续发详细的投放方案和报价。'],
    ['', ''],
    ['━━━ 综合评估 ━━━', ''],
    ['适配度评分', '★★★★☆  4分'],
    ['优势', '5A级景区，客流量大且稳定；路况整体良好；已有电瓶车运营基础，游客接受度高；景区管理方有合作意愿。'],
    ['劣势/风险', '后山陡坡路段存在安全隐患，需限制通行区域；已有两家电瓶车租赁商；景区对车辆外观有统一要求。'],
    ['下一步计划', '发送投放方案和报价 → 约二次面谈 → 确认合作模式（分成/租赁）'],
    ['备注', '景区每年3-11月为旺季，建议旺季前完成投放。'],
    ['', ''],
    ['', '报告生成于 2026-05-27']
  ];

  // ============================================================
  // Sheet 2: 数据汇总（横向一行，可直接复制到总表）
  // ============================================================
  var headers = [
    // ── 基本信息（最重要）──
    '景区名称',
    '所在城市',
    '调研日期',
    '调研人员',

    // ── 现场实勘 ──
    '景区类型',
    '工作日客流(千)',
    '周末客流(千)',
    '节假日客流(千)',
    '景观分布',
    '现有代步工具',
    '四轮自行车收费',
    '四轮电瓶车收费',
    '观光车收费',
    '其他代步工具收费',
    '车辆停放点',
    '路面情况',
    '路面备注',
    '充电/停车设施',

    // ── 线上推广 ──
    '推广平台',
    '推广活动',
    '直播',
    '消费券/门票',
    '消费券/门票说明',
    '门票最高销量',
    '活动券/团购券信息',

    // ── 综合评估 ──
    '适配度评分',
    '优势',
    '劣势/风险',
    '下一步计划',
    '备注',

    // ── 实勘照片（仅文字）──
    '照片数量',
    '照片描述',

    // ── 负责人对接 ──
    '对接状态',
    '负责人姓名',
    '负责人职务',
    '负责人电话',
    '负责人微信',
    '对接备注'
  ];

  var dataRow = [
    // ── 基本信息 ──
    '黄山风景区',
    '安徽省黄山市',
    '2026-05-27',
    '张三',

    // ── 现场实勘 ──
    '5A',
    12,
    30,
    50,
    '分散（需交通工具）',
    '四轮自行车、四轮电瓶车、观光车',
    '起步价 半小时 60元，超出后 每分钟 1元',
    '起步价 一小时起 100元，超出后 每半小时 50元',
    '单程 20元/人',
    '',
    '充足',
    '大部分平整',
    '主干道柏油路面，部分支路石板路。后山约200米陡坡坡度约15°',
    '有且方便 — 充电桩8个',

    // ── 线上推广 ──
    '抖音、小红书、公众号',
    '有',
    '无',
    '有',
    '抖音团购门票 198元/人，含大门票+索道',
    '约8,000张（2025国庆）',
    '早鸟票提前3天购票8折；团购套餐含门票+住宿',

    // ── 综合评估 ──
    '4',
    '5A级客流量大且稳定；路况整体良好；已有电瓶车运营基础；管理方有合作意愿。',
    '后山陡坡需限制通行；已有两家电瓶车租赁商；景区对车辆外观有统一要求。',
    '发送投放方案和报价 → 约二次面谈 → 确认合作模式',
    '每年3-11月为旺季，建议旺季前完成投放。',

    // ── 实勘照片 ──
    '3',
    '景区入口停放点；后山石板路面破损处；充电桩区域',

    // ── 负责人对接 ──
    '已对接',
    '李建国',
    '运营部经理',
    '13905591234',
    'lijg_huangshan',
    '态度积极，对我们车型有兴趣。建议后续发详细的投放方案和报价。'
  ];

  // Build Sheet 2 as header row + data row
  var summaryRows = [headers, dataRow];

  // ============================================================
  // Create workbook
  // ============================================================
  var wb = XLSX.utils.book_new();

  // Sheet 1: 调研报告
  var ws1 = XLSX.utils.aoa_to_sheet(reportRows);
  ws1['!cols'] = [{wch:22},{wch:68}];
  ws1['!merges'] = [
    {s:{r:1,c:0}, e:{r:1,c:1}},
    {s:{r:3,c:0}, e:{r:3,c:1}},
    {s:{r:9,c:0}, e:{r:9,c:1}},
    {s:{r:12,c:1}, e:{r:12,c:1}},  // sub-header row doesn't need merge
    {s:{r:35,c:0}, e:{r:35,c:1}},
    {s:{r:42,c:0}, e:{r:42,c:1}},
    {s:{r:50,c:0}, e:{r:50,c:1}},
    {s:{r:57,c:0}, e:{r:57,c:1}},
  ];
  XLSX.utils.book_append_sheet(wb, ws1, '调研报告');

  // Sheet 2: 数据汇总
  var ws2 = XLSX.utils.aoa_to_sheet(summaryRows);
  // Set column widths
  var colWidths = [
    {wch:16}, // 景区名称
    {wch:16}, // 所在城市
    {wch:12}, // 调研日期
    {wch:10}, // 调研人员
    {wch:12}, // 景区类型
    {wch:14}, // 工作日客流
    {wch:14}, // 周末客流
    {wch:14}, // 节假日客流
    {wch:22}, // 景观分布
    {wch:28}, // 现有代步工具
    {wch:32}, // 四轮自行车收费
    {wch:32}, // 四轮电瓶车收费
    {wch:24}, // 观光车收费
    {wch:24}, // 其他代步工具收费
    {wch:30}, // 停放点
    {wch:14}, // 路面情况
    {wch:36}, // 路面备注
    {wch:28}, // 充电/停车设施
    {wch:22}, // 推广平台
    {wch:10}, // 推广活动
    {wch:8},  // 直播
    {wch:10}, // 消费券/门票
    {wch:36}, // 消费券/门票说明
    {wch:26}, // 门票最高销量
    {wch:36}, // 活动券/团购券信息
    {wch:12}, // 适配度评分
    {wch:50}, // 优势
    {wch:50}, // 劣势/风险
    {wch:40}, // 下一步计划
    {wch:36}, // 备注
    {wch:10}, // 照片数量
    {wch:36}, // 照片描述
    {wch:10}, // 对接状态
    {wch:12}, // 负责人姓名
    {wch:14}, // 负责人职务
    {wch:16}, // 负责人电话
    {wch:20}, // 负责人微信
    {wch:40}, // 对接备注
  ];
  ws2['!cols'] = colWidths;

  // Freeze header row
  ws2['!freeze'] = {xSplit:0, ySplit:1, topLeftCell:'A2', activePane:'bottomLeft'};

  XLSX.utils.book_append_sheet(wb, ws2, '数据汇总');

  // Download
  XLSX.writeFile(wb, 'sample-黄山风景区.xlsx');
}
</script>
</body>
</html>
